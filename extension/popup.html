<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tabductor</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f9fb;
        --fg: #15202b;
        --muted: #52606d;
        --border: #d7dee7;
        --card-bg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1f2e;
          --fg: #e2e8f0;
          --muted: #94a3b8;
          --border: #2d3748;
          --card-bg: #242b3d;
        }
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        margin: 12px;
        width: 360px;
        color: var(--fg);
        background: var(--bg);
      }
      label,
      input,
      button {
        display: block;
        width: 100%;
      }
      input {
        margin-top: 8px;
        margin-bottom: 8px;
        padding: 8px;
        box-sizing: border-box;
        background: var(--card-bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      button {
        margin-top: 8px;
        margin-bottom: 8px;
        padding: 8px;
        box-sizing: border-box;
        background: var(--card-bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.85;
      }
      .button-row {
        display: flex;
        gap: 8px;
      }
      .button-row button {
        flex: 1 1 auto;
      }
      #status {
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.4;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
      }
      #connected-tabs {
        margin-top: 12px;
      }
      .section-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .tab-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        margin-top: 8px;
        background: var(--card-bg);
      }
      .tab-card button {
        width: auto;
        margin-bottom: 0;
      }
      .tab-title {
        font-weight: 600;
      }
      .tab-url,
      .tab-meta {
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
        margin-top: 4px;
        word-break: break-word;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <strong>Tabductor</strong>
    <label for="server-url">Server URL</label>
    <input id="server-url" type="text" />
    <div class="button-row">
      <button id="save-url">Save URL</button>
      <button id="refresh">Refresh</button>
    </div>
    <div class="button-row">
      <button id="connect">Connect Active Tab</button>
      <button id="disconnect" class="hidden">Disconnect Active Tab</button>
    </div>
    <div id="status"></div>
    <div id="connected-tabs">
      <div class="section-title">Connected Tabs</div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
